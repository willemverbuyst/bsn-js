name: Code Checks

on: pull_request

jobs:
  code-checks:
    name: Code Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci

      - name: Check size
        run: npm run size:check

      - name: Check format
        run: npm run fmt:check

      - name: Check lint
        run: npm run lint:check
